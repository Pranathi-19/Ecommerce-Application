<!DOCTYPE html>
<html>
<head>
    <title>Cart</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #c9c8d9;
            padding: 20px;
        }

        .table {
            background-color: #e6e6e6;
            border: 5px solid #C71585;
        }

        .btn-custom {
            background-color: #4db6ac;
            color: white;
            border: none;
        }

        .btn-custom:hover {
            background-color: #009688;
        }
    </style>
</head>

<body onload="loadCart()">

<h2 class="text-center mb-4">Shopping Cart</h2>

<div class="container">
    <table class="table table-bordered text-center">
        <thead>
            <tr>
                <th>Product</th>
                <th>Price</th>
                <th>Quantity</th>
                <th>Total</th>
            </tr>
        </thead>
        <tbody id="cartBody">
        </tbody>
    </table>

    <div class="text-end">
        <h5 id="totalAmount"></h5>
        <button class="btn btn-custom" onclick="checkout()">Checkout</button>
    </div>
</div>

<script>
function loadCart() {

    let cart = JSON.parse(localStorage.getItem("cart")) || [];
    let cartBody = document.getElementById("cartBody");
    let total = 0;

    cartBody.innerHTML = "";

    cart.forEach(item => {

        let row = `
            <tr>
                <td>${item.name}</td>
                <td>₹${item.price}</td>
                <td>${item.quantity}</td>
                <td>₹${item.price * item.quantity}</td>
            </tr>
        `;

        cartBody.innerHTML += row;
        total += item.price * item.quantity;
    });

    document.getElementById("totalAmount").innerText = "Total Amount: ₹" + total;
}

function checkout() {

    alert("Order placed successfully!");

    // Clear cart
    localStorage.removeItem("cart");

    // Redirect inside iframe to logout page
    window.parent.frames["content"].location.href = "logout.html";
}
</script>
