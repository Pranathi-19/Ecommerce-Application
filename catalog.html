<!DOCTYPE html>
<html>
<head>
    <title>Catalog</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #c9c8d9;
            padding: 20px;
        }

        .card {
            background-color: #e6e6e6;
            border: 5px solid #C71585;
        }

        .btn-custom {
            background-color: #4db6ac;
            color: white;
            border: none;
        }

        .btn-custom:hover {
            background-color: #009688;
        }
    </style>
</head>

<body>

<h2 class="text-center mb-4">Product Catalog</h2>

<div class="container">
    <div class="row g-4">

        <div class="col-md-4">
            <div class="card p-3 text-center">
                <h5>Product 1</h5>
                <p>Price: ₹500</p>
                <button class="btn btn-custom" onclick="addToCart('Product 1',500)">Add to Cart</button>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card p-3 text-center">
                <h5>Product 2</h5>
                <p>Price: ₹750</p>
                <button class="btn btn-custom" onclick="addToCart('Product 2',750)">Add to Cart</button>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card p-3 text-center">
                <h5>Product 3</h5>
                <p>Price: ₹1000</p>
                <button class="btn btn-custom" onclick="addToCart('Product 3',1000)">Add to Cart</button>
            </div>
        </div>

    </div>
</div>

<script>
function addToCart(name, price) {

    let cart = JSON.parse(localStorage.getItem("cart")) || [];

    let existingProduct = cart.find(item => item.name === name);

    if (existingProduct) {
        existingProduct.quantity += 1;
    } else {
        cart.push({ name: name, price: price, quantity: 1 });
    }

    localStorage.setItem("cart", JSON.stringify(cart));

    alert(name + " added to cart!");
}
</script>

</body>
</html>
